<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客管理アプリ</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--pri:#1e40af;--pri-l:#dbeafe;--pri-d:#1e3a8a;--ok:#16a34a;--ok-l:#dcfce7;
--warn:#f59e0b;--warn-l:#fef3c7;--err:#dc2626;--err-l:#fee2e2;
--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g400:#9ca3af;--g500:#6b7280;
--g600:#4b5563;--g700:#374151;--g800:#1f2937;--r:6px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Segoe UI","Hiragino Sans","Meiryo",sans-serif;background:var(--g100);color:var(--g800);font-size:13px;line-height:1.5;}

/* Login */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f,#1e40af);}
.login-box{background:#fff;border-radius:12px;padding:40px;width:90%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.login-box h1{font-size:20px;margin-bottom:4px;} .login-box p{font-size:13px;color:var(--g500);margin-bottom:20px;}
.login-box .fg{margin-bottom:14px;} .login-box label{display:block;font-size:12px;font-weight:600;margin-bottom:3px;color:var(--g600);}
.login-box input{width:100%;padding:10px 12px;border:1px solid var(--g300);border-radius:var(--r);font-size:14px;outline:none;}
.login-box input:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(30,64,175,.1);}
.login-err{color:var(--err);font-size:12px;margin-top:8px;display:none;}

/* Header */
.hdr{background:var(--pri);color:#fff;padding:6px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);gap:6px;}
.hdr-l{display:flex;align-items:center;gap:10px;} .hdr h1{font-size:14px;font-weight:700;}
.hdr-r{display:flex;gap:5px;align-items:center;}
.hdr .user-info{font-size:10px;opacity:.8;}

/* Year */
.yr-sel{display:flex;align-items:center;gap:3px;background:rgba(255,255,255,.12);border-radius:var(--r);padding:2px 3px;}
.yr-btn{padding:3px 10px;font-size:11px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.7);border:none;border-radius:4px;}
.yr-btn:hover{background:rgba(255,255,255,.15);color:#fff;} .yr-btn.active{background:rgba(255,255,255,.25);color:#fff;}
.yr-del{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--err);color:#fff;font-size:9px;line-height:14px;text-align:center;cursor:pointer;display:none;border:1px solid rgba(255,255,255,.5);}
.yr-btn:hover .yr-del{display:block;}

/* Buttons */
.btn{padding:5px 10px;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:3px;}
.btn:hover{opacity:.88;} .btn-p{background:var(--pri);color:#fff;} .btn-d{background:var(--err);color:#fff;}
.btn-o{background:#fff;color:var(--g700);border:1px solid var(--g300);} .btn-w{background:rgba(255,255,255,.18);color:#fff;border:1px solid rgba(255,255,255,.3);}
.btn-sm{padding:3px 8px;font-size:10px;} .btn-s{background:var(--ok);color:#fff;}

/* Tabs - Customer */
.cust-tabs{background:#fff;border-bottom:2px solid var(--g300);display:flex;padding:0 16px;position:sticky;top:34px;z-index:99;box-shadow:0 2px 4px rgba(0,0,0,.05);}
.cust-tab{padding:12px 24px;font-size:15px;font-weight:700;color:var(--g500);cursor:pointer;border-bottom:4px solid transparent;margin-bottom:-2px;white-space:nowrap;letter-spacing:.5px;}
.cust-tab:hover{color:var(--g700);background:var(--g50);} .cust-tab.active{color:var(--pri);border-bottom-color:var(--pri);background:var(--pri-l);}

/* Sub tabs */
.sub-tabs{background:var(--g50);border-bottom:1px solid var(--g300);display:flex;padding:0 16px;gap:2px;}
.sub-tab{padding:10px 18px;font-size:13px;font-weight:700;color:var(--g500);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;}
.sub-tab:hover{color:var(--g700);background:var(--g100);} .sub-tab.active{color:var(--pri-d);border-bottom-color:var(--pri-d);background:#fff;}

.wrap{padding:12px 16px;max-width:1400px;margin:0 auto;}

/* Quote table - 視認性改善 */
.qt-wrap{overflow:auto;background:#fff;border-radius:8px;border:2px solid var(--g300);box-shadow:0 2px 6px rgba(0,0,0,.08);}
.qt{border-collapse:collapse;width:100%;font-size:13px;}
.qt thead th{background:linear-gradient(to bottom,#e5e7eb,#d1d5db);padding:6px;border:1px solid #9ca3af;font-weight:800;color:#1f2937;font-size:11px;letter-spacing:.3px;text-align:center;position:sticky;top:0;z-index:3;}
.qt thead th .unit{font-size:10px;font-weight:600;color:var(--g500);}
.qt tbody td{padding:1px 4px;border:1px solid #d1d5db;vertical-align:middle;font-size:12px;line-height:1;}

/* 品番セル（控えめに）*/
.qt-code-cell{background:#f9fafb;border-left:2px solid var(--g400);font-weight:600;min-width:100px;padding:4px 6px !important;vertical-align:middle !important;color:var(--g700);}
.qt-code{font-size:12px;font-weight:700;color:var(--g700);}
.qt-code-in{width:100%;padding:4px;border:1px solid transparent;font-size:12px;font-weight:600;outline:none;background:transparent;color:var(--g700);}
.qt-code-in:focus{border-color:var(--pri);background:#fff;}
.qt-custom-badge{font-size:9px;color:#92400e;background:#fef3c7;padding:1px 6px;border-radius:3px;display:inline-block;margin-top:3px;font-weight:600;}

/* 行色分け（行全体に統一の色）*/
.qt-main td{background:#ffffff;}
.qt-sub td{background:#fef9e7;}
.qt-parent.qt-main td{background:#f3f4f6;}
.qt-custom td{background:#fef3c7;}
.qt-row:hover td{background:#dbeafe !important;}

/* カテゴリ */
.qt-cat{font-weight:700;color:var(--g700);text-align:center;font-size:12px;}
.qt-cat-sub{color:#92400e;font-weight:700;}

/* 入力フィールド（金額を強調） */
.qt-in{width:100%;padding:3px 6px;border:1px solid transparent;border-radius:4px;font-size:12px;outline:none;background:transparent;font-weight:600;color:#111827;line-height:1.3;}
.qt-in:hover{border-color:var(--g400);background:rgba(255,255,255,.8);}
.qt-in:focus{border-color:var(--pri);background:#fff;box-shadow:0 0 0 2px rgba(30,64,175,.2);}
.qt-num{text-align:right;font-variant-numeric:tabular-nums;}
/* 金額入力のセル（全体を強調） */
.qt-money-cell{position:relative;padding:1px 4px !important;}
.qt-money-cell .qt-in{font-size:13px;font-weight:700;color:#065f46;padding-left:18px;}
.qt-money-cell .qt-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g600);font-weight:700;font-size:12px;pointer-events:none;}
/* % 付き入力 */
.qt-pct-cell{position:relative;padding:1px 4px !important;}
.qt-pct-cell .qt-in{padding-right:18px;}
.qt-pct-cell .qt-suffix{position:absolute;right:6px;top:50%;transform:translateY(-50%);color:var(--g600);font-weight:700;font-size:11px;pointer-events:none;}

.qt-sel{width:100%;padding:3px 4px;border:1px solid transparent;border-radius:4px;font-size:11px;font-weight:700;outline:none;background:transparent;color:var(--pri-d);cursor:pointer;text-align:center;}
.qt-sel:hover{border-color:var(--g400);background:#fff;}

/* 計算値（自動・太字だが背景は行に合わせる） */
.qt-calc{text-align:right;color:var(--g500);font-weight:700;font-variant-numeric:tabular-nums;padding:4px 6px !important;font-size:12px;font-style:italic;}

/* 固定表示セル（編集不可） */
.qt-fixed{text-align:center;color:var(--g600);font-weight:700;font-size:12px;background:#f9fafb;}

/* 卸値・副資材込（メイン金額として強調） */
.qt-main-money .qt-in{font-size:13px !important;font-weight:800 !important;color:#1e3a8a !important;}

/* 無効セル */
.qt-disabled{color:var(--g400);text-align:center;}

/* 数値入力からスピナー削除 */
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type="number"]{-moz-appearance:textfield;}

/* 発注書 */
.po-card{background:#fff;border:2px solid var(--g300);border-radius:8px;margin-bottom:16px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.po-header{padding:10px 14px;background:linear-gradient(to right,#dbeafe,#eff6ff);border-bottom:2px solid var(--pri);display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
.po-lbl{display:block;font-size:10px;font-weight:700;color:var(--pri-d);margin-bottom:2px;letter-spacing:.3px;}
.po-date{padding:5px 8px;border:1px solid var(--g300);border-radius:4px;font-size:13px;font-weight:700;outline:none;background:#fff;color:var(--g800);}
.po-date:focus{border-color:var(--pri);box-shadow:0 0 0 2px rgba(30,64,175,.2);}
.po-note{padding:5px 8px;border:1px solid var(--g300);border-radius:4px;font-size:12px;outline:none;background:#fff;width:100%;min-width:200px;}

.po-tbl{border-collapse:collapse;width:100%;font-size:12px;}
.po-tbl thead th{background:linear-gradient(to bottom,#e5e7eb,#d1d5db);padding:5px 6px;border:1px solid #9ca3af;font-weight:700;color:var(--g700);font-size:11px;text-align:center;}
.po-tbl tbody td{padding:1px 4px;border:1px solid var(--g200);position:relative;line-height:1;}
.po-tbl tbody tr:hover td{background:#eff6ff;}

.po-in{width:100%;padding:3px 6px;border:1px solid transparent;border-radius:3px;font-size:12px;outline:none;background:transparent;font-weight:500;line-height:1.3;}
.po-in:hover{border-color:var(--g400);background:#fff;}
.po-in:focus{border-color:var(--pri);background:#fff;box-shadow:0 0 0 2px rgba(30,64,175,.15);}
.po-num{text-align:right;font-variant-numeric:tabular-nums;font-weight:600;}
.po-money{padding-left:18px;font-size:12px;font-weight:700;color:#065f46;}
.po-prefix{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g600);font-weight:700;font-size:11px;pointer-events:none;}

/* 未登録品番警告 */
.po-code-warn{background:#fee2e2 !important;color:#991b1b !important;font-weight:700 !important;border:2px solid #ef4444 !important;}
.po-warn-icon{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:14px;cursor:help;}

/* Meeting list */
.mt-card{background:#fff;border-radius:var(--r);border:1px solid var(--g200);margin-bottom:10px;overflow:hidden;}
.mt-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;background:var(--g50);border-bottom:1px solid var(--g200);cursor:pointer;}
.mt-header:hover{background:var(--pri-l);}
.mt-date{font-weight:700;color:var(--pri);font-size:13px;} .mt-title{font-weight:600;flex:1;margin-left:12px;}
.mt-body{padding:14px;display:none;} .mt-body.open{display:block;}
.mt-section{margin-bottom:12px;}
.mt-section h3{font-size:12px;font-weight:700;color:var(--g600);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--g200);}
.mt-section pre{white-space:pre-wrap;font-family:inherit;font-size:12px;color:var(--g700);line-height:1.6;background:var(--g50);padding:8px;border-radius:4px;}
.mt-tasks{background:var(--warn-l);padding:8px;border-radius:4px;} .mt-ctasks{background:var(--pri-l);padding:8px;border-radius:4px;}

/* Decision list */
.dec-item{padding:8px 12px;border-bottom:1px solid var(--g100);display:flex;gap:10px;align-items:flex-start;}
.dec-item:last-child{border-bottom:none;}
.dec-date{font-size:10px;color:var(--g400);min-width:70px;} .dec-content{flex:1;font-size:12px;}
.dec-tag{font-size:9px;padding:1px 6px;border-radius:8px;background:var(--pri-l);color:var(--pri-d);font-weight:600;}
.dec-code{font-size:9px;color:var(--g500);}

/* Modal */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center;}
.mo.active{display:flex;}
.mo-box{background:#fff;border-radius:10px;width:95%;max-width:800px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.mo-hd{padding:14px 18px;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center;}
.mo-hd h2{font-size:15px;} .mo-cl{background:none;border:none;font-size:20px;cursor:pointer;color:var(--g400);} .mo-cl:hover{color:var(--g700);}
.mo-bd{padding:16px 18px;} .mo-ft{padding:10px 18px;border-top:1px solid var(--g200);display:flex;justify-content:space-between;gap:6px;}
.fg{margin-bottom:10px;} .fg label{display:block;font-size:11px;font-weight:600;color:var(--g600);margin-bottom:2px;}
.fg input,.fg select,.fg textarea{width:100%;padding:6px 8px;border:1px solid var(--g300);border-radius:var(--r);font-size:12px;outline:none;font-family:inherit;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(30,64,175,.1);}
.fg-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.fg textarea{min-height:80px;resize:vertical;}

/* Decision inline add */
.dec-add{display:flex;gap:6px;padding:8px;background:var(--g50);border-radius:4px;margin-top:8px;}
.dec-add input{flex:1;padding:4px 8px;font-size:11px;border:1px solid var(--g300);border-radius:4px;outline:none;}
.dec-add select{padding:4px;font-size:10px;border:1px solid var(--g300);border-radius:4px;}

/* Toast & saving */
.toast{position:fixed;bottom:16px;right:16px;background:var(--g800);color:#fff;padding:8px 14px;border-radius:var(--r);font-size:12px;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s;}
.toast.show{transform:translateY(0);opacity:1;}
.saving{position:fixed;top:38px;right:16px;background:var(--warn);color:#fff;padding:4px 10px;border-radius:var(--r);font-size:10px;font-weight:600;z-index:200;display:none;}
.saving.show{display:block;}

.empty{text-align:center;padding:40px;color:var(--g400);} .empty p{font-size:14px;margin:6px 0 10px;}
@media(max-width:768px){.wrap{padding:8px;}.fg-row{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- Login -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <h1>📝 顧客管理アプリ</h1>
    <p>メールアドレスとパスワードでログイン</p>
    <div class="fg"><label>メールアドレス</label><input type="email" id="loginEmail"></div>
    <div class="fg"><label>パスワード</label><input type="password" id="loginPass"></div>
    <button class="btn btn-p" onclick="doLogin()" style="width:100%;padding:10px;font-size:13px;">ログイン</button>
    <button class="btn btn-o" onclick="doSignup()" style="width:100%;padding:8px;font-size:12px;margin-top:8px;">新規アカウント作成</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- App -->
<div id="appScreen" style="display:none;">
  <div class="hdr">
    <div class="hdr-l"><h1>📝 顧客管理</h1><div class="yr-sel" id="yearSel"></div></div>
    <div class="hdr-r">
      <span class="user-info" id="userInfo"></span>
      <button class="btn btn-w btn-sm" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="cust-tabs" id="custTabs"></div>
  <div class="sub-tabs" id="subTabs"></div>
  <div class="wrap" id="content"></div>
</div>

<!-- Meeting Modal -->
<div class="mo" id="mtMo">
  <div class="mo-box">
    <div class="mo-hd"><h2 id="mtTitle">新規打合せ</h2><button class="mo-cl" onclick="closeMo('mtMo')">&times;</button></div>
    <div class="mo-bd">
      <input type="hidden" id="mtId">
      <div class="fg-row">
        <div class="fg"><label>日付 *</label><input type="date" id="mtDate"></div>
        <div class="fg"><label>タイトル *</label><input type="text" id="mtTitleIn" placeholder="第1回 開発打合せ"></div>
        <div class="fg"><label>参加者</label><input type="text" id="mtAttendees" placeholder="田中、佐藤、李"></div>
      </div>
      <div class="fg"><label>議事内容</label><textarea id="mtContent" rows="6" placeholder="打ち合わせの内容を記載"></textarea></div>
      <div class="fg"><label>弊社タスク</label><textarea id="mtOurTasks" rows="3" placeholder="自社側のアクション項目"></textarea></div>
      <div class="fg"><label>お客様タスク</label><textarea id="mtCustTasks" rows="3" placeholder="顧客側のアクション項目"></textarea></div>
      <div id="decisionArea"></div>
    </div>
    <div class="mo-ft">
      <button class="btn btn-o" onclick="copyForEmail()" title="メール用にコピー">📋 メール用コピー</button>
      <div>
        <button class="btn btn-o" onclick="closeMo('mtMo')">キャンセル</button>
        <button class="btn btn-p" id="mtSaveBtn" onclick="saveMeeting()">保存</button>
      </div>
    </div>
  </div>
</div>

<div class="saving" id="savingInd">保存中...</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://ootpmvitsggulcqvufsd.supabase.co';
const SB_KEY='sb_publishable_3trYXswFYXxq5cQji3G81g_woQLl_Xk';
const sb=supabase.createClient(SB_URL,SB_KEY);

let CUSTOMERS=[],MEETINGS=[],DECISIONS=[],QUOTES=[],PRODUCTS=[],POS=[],POITEMS=[],CO_SETTINGS={},YEARS=[];
let CUR_YEAR=2026,curCust=null,curView='meetings',currentUser=null,saveTimer=null;
let editDecisions=[];

// ── Auth ──
async function checkAuth(){const{data:{session}}=await sb.auth.getSession();if(session){currentUser=session.user;showApp();}}
async function doLogin(){
  const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value;
  if(!e||!p){showLoginErr('入力してください');return;}
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error){showLoginErr(error.message);return;}
  const{data:{session}}=await sb.auth.getSession();currentUser=session.user;showApp();
}
async function doSignup(){
  const e=document.getElementById('loginEmail').value.trim(),p=document.getElementById('loginPass').value;
  if(!e||!p){showLoginErr('入力してください');return;}
  if(p.length<6){showLoginErr('パスワードは6文字以上');return;}
  const{error}=await sb.auth.signUp({email:e,password:p});
  if(error){showLoginErr(error.message);return;}
  const el=document.getElementById('loginErr');el.textContent='確認メールを送信しました。メール内のリンクをクリック後にログインしてください。';el.style.display='block';el.style.color='var(--ok)';
}
async function doLogout(){await sb.auth.signOut();location.reload();}
function showLoginErr(m){const e=document.getElementById('loginErr');e.textContent=m;e.style.display='block';}
function isAdmin(){return currentUser?.user_metadata?.role==='admin'||currentUser?.app_metadata?.role==='admin';}
function showApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  const roleLabel=isAdmin()?' 👑':'';
  document.getElementById('userInfo').textContent=currentUser.email+roleLabel;
  loadData();
}

// ── Data ──
async function loadData(){
  const[{data:y},{data:c}]=await Promise.all([
    sb.from('years').select('year').order('year'),
    sb.from('customers').select('*').order('sort_order')
  ]);
  YEARS=(y||[]).map(r=>r.year);if(!YEARS.length)YEARS=[2026];
  CUSTOMERS=c||[];
  CUR_YEAR=YEARS[YEARS.length-1];
  curCust=CUSTOMERS[0]?.id||null;
  await loadMeetings();
}
async function loadMeetings(){
  const coName=CUSTOMERS.find(c=>c.id===curCust)?.name||'';
  let q=sb.from('meetings').select('*').eq('year',CUR_YEAR).order('meeting_date',{ascending:false});
  if(curCust)q=q.eq('customer_id',curCust);
  const{data:m}=await q;
  MEETINGS=m||[];
  let dq=sb.from('decisions').select('*').eq('year',CUR_YEAR).order('decided_at',{ascending:false});
  if(curCust)dq=dq.eq('customer_id',curCust);
  const{data:d}=await dq;
  DECISIONS=d||[];
  // 見積り・品番・発注 取得
  if(coName){
    const[{data:qt},{data:cs},{data:pr},{data:po}]=await Promise.all([
      sb.from('quotes').select('*').eq('year',CUR_YEAR).eq('company',coName).order('sort_order'),
      sb.from('company_settings').select('*').eq('company',coName).single(),
      sb.from('products').select('id,company,code,is_parent,category,sort_order').eq('year',CUR_YEAR).eq('company',coName).order('sort_order'),
      sb.from('purchase_orders').select('*').eq('year',CUR_YEAR).eq('company',coName).order('receive_date',{ascending:false})
    ]);
    QUOTES=qt||[];
    CO_SETTINGS=cs||{default_currency:'JPY',default_rate_jpy:20,default_rate_usd:0.14};
    PRODUCTS=pr||[];
    POS=po||[];
    if(POS.length){
      const poIds=POS.map(p=>p.id);
      const{data:items}=await sb.from('purchase_order_items').select('*').in('po_id',poIds).order('sort_order');
      POITEMS=items||[];
    }else POITEMS=[];
  }else{QUOTES=[];PRODUCTS=[];CO_SETTINGS={};POS=[];POITEMS=[];}
  render();
}

async function saveQuote(q){
  document.getElementById('savingInd').classList.add('show');
  q.updated_by=currentUser.email;q.updated_at=new Date().toISOString();
  await sb.from('quotes').upsert(q);
  document.getElementById('savingInd').classList.remove('show');
}
function debounceSaveQuote(q){if(saveTimer)clearTimeout(saveTimer);saveTimer=setTimeout(()=>saveQuote(q),400);}

function render(){
  // Year
  document.getElementById('yearSel').innerHTML=YEARS.map(y=>{
    const canDel=YEARS.length>1;
    return`<button class="yr-btn${CUR_YEAR===y?' active':''}" onclick="switchYear(${y})" style="position:relative;">${y}年度${canDel?`<span class="yr-del" onclick="event.stopPropagation();deleteYear(${y})">×</span>`:''}</button>`;
  }).join('')+
    `<button class="yr-btn" style="background:rgba(255,255,255,.15);border:1px dashed rgba(255,255,255,.4);" onclick="addYear()">＋</button>`;
  // Customer tabs
  document.getElementById('custTabs').innerHTML=
    CUSTOMERS.map(c=>`<div class="cust-tab${curCust===c.id?' active':''}" onclick="switchCust('${c.id}')">${esc(c.name)}</div>`).join('');
  // Sub tabs
  let subTabsHtml=
    `<div class="sub-tab${curView==='meetings'?' active':''}" onclick="curView='meetings';render();">打合せ一覧</div>`+
    `<div class="sub-tab${curView==='decisions'?' active':''}" onclick="curView='decisions';render();">決定事項一覧</div>`;
  if(isAdmin()){
    subTabsHtml+=`<div class="sub-tab${curView==='quotes'?' active':''}" onclick="curView='quotes';render();">💰 見積り管理</div>`;
    subTabsHtml+=`<div class="sub-tab${curView==='pos'?' active':''}" onclick="curView='pos';render();">📋 発注書</div>`;
  }
  document.getElementById('subTabs').innerHTML=subTabsHtml;

  // 非管理職が管理職限定タブを見ている場合、打合せに強制変更
  if((curView==='quotes'||curView==='pos')&&!isAdmin())curView='meetings';

  const ct=document.getElementById('content');
  if(curView==='meetings')ct.innerHTML=renderMeetings();
  else if(curView==='decisions')ct.innerHTML=renderDecisions();
  else if(curView==='quotes'&&isAdmin())ct.innerHTML=renderQuotes();
  else if(curView==='pos'&&isAdmin())ct.innerHTML=renderPOs();
}

function renderMeetings(){
  let h=`<div style="margin-bottom:10px;"><button class="btn btn-p" onclick="openNewMeeting()">＋ 新規打合せ</button></div>`;
  if(!MEETINGS.length)return h+'<div class="empty"><p>打合せがまだありません</p></div>';
  MEETINGS.forEach(m=>{

          <button class="btn btn-o btn-sm" onclick="event.stopPropagation();openEditMeeting('${m.id}')">編集</button>
          <button class="btn btn-d btn-sm" onclick="event.stopPropagation();delMeeting('${m.id}')">削除</button>
        </div>
      </div>
      <div class="mt-body" id="mt-${m.id}">`;
    if(m.attendees)h+=`<div class="mt-section"><h3>参加者</h3><pre>${esc(m.attendees)}</pre></div>`;
    if(m.content)h+=`<div class="mt-section"><h3>議事内容</h3><pre>${esc(m.content)}</pre></div>`;
    if(m.our_tasks)h+=`<div class="mt-section"><h3>弊社タスク</h3><div class="mt-tasks"><pre>${esc(m.our_tasks)}</pre></div></div>`;
    if(m.customer_tasks)h+=`<div class="mt-section"><h3>お客様タスク</h3><div class="mt-ctasks"><pre>${esc(m.customer_tasks)}</pre></div></div>`;
    if(decs.length){

// ── 発注書 ──
function renderPOs(){
  const coName=CUSTOMERS.find(c=>c.id===curCust)?.name||'';
  const defaultCurrency=CO_SETTINGS.default_currency||'JPY';
  const u=defaultCurrency==='JPY'?'¥':'$';

  // 見積り（メイン行）から品番→副資材込み価格マップ作成
  // wholesale_with_sub を優先、なければwholesale_priceにフォールバック
  const priceMap={};
  QUOTES.forEach(q=>{
    if(q.quote_type==='sub')return;
    const code=q.product_id?(PRODUCTS.find(p=>p.id===q.product_id)?.code||'').trim():(q.product_code||'');
    if(code){
      const price=q.wholesale_with_sub||q.wholesale_price||0;
      if(price)priceMap[code]=price;
    }
  });
  // マスター品番一覧
  const masterCodes=new Set(PRODUCTS.map(p=>(p.code||'').trim()));
  // 会社別の備考プレースホルダー
  const remarkPh=coName==='クロダルマ'?'指図':(coName==='シンメン'?'カラー':(coName==='NSP'?'注文No.':''));

  let h=`<div style="margin-bottom:12px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
    <button class="btn btn-p" onclick="addBulkPO()">＋ 量産発注を作成（全品番一括）</button>
    <button class="btn btn-o" onclick="addEmptyPO()">＋ 空の発注書を作成</button>
  </div>`;

  if(!POS.length)return h+'<div class="empty"><p>発注書がまだありません</p></div>';

  POS.forEach(po=>{
    const items=POITEMS.filter(i=>i.po_id===po.id);
    h+=`<div class="po-card">
      <div class="po-header">
        <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap;">
          <div><label class="po-lbl">📅 発注受領日</label><input type="date" value="${po.receive_date||''}" onchange="updPO('${po.id}','receive_date',this.value)" class="po-date"></div>
          <div><label class="po-lbl">📤 発注送付日</label><input type="date" value="${po.send_date||''}" onchange="updPO('${po.id}','send_date',this.value)" class="po-date"></div>
          <div style="flex:1;"><label class="po-lbl">備考</label><input type="text" value="${esc(po.notes||'')}" onchange="updPO('${po.id}','notes',this.value)" class="po-note" placeholder="メモ"></div>
        </div>
        <button class="btn btn-d btn-sm" onclick="delPO('${po.id}')">発注書削除</button>
      </div>
      <div style="overflow:auto;"><table class="po-tbl">
        <thead><tr>
          <th style="min-width:120px;">品番</th>
          <th style="min-width:120px;">備考</th>
          <th style="min-width:80px;">数量</th>
          <th style="min-width:120px;">希望納期</th>
          <th style="min-width:110px;">副資材込み価格</th>
          <th style="min-width:50px;"></th>
        </tr></thead><tbody>`;
    items.forEach(it=>{
      const isMaster=masterCodes.has((it.product_code||'').trim());
      const codeClass=it.product_code&&!isMaster?'po-code-warn':'';
      const autoPrice=priceMap[(it.product_code||'').trim()]||0;
      h+=`<tr>
        <td><input type="text" value="${esc(it.product_code||'')}" onchange="updPOItem('${it.id}','product_code',this.value)" class="po-in ${codeClass}" placeholder="品番">${it.product_code&&!isMaster?'<span class="po-warn-icon" title="マスターに未登録です。開発・生産管理アプリで品番登録をお願いします">⚠️</span>':''}</td>
        <td><input type="text" value="${esc(it.shiji_code||'')}" onchange="updPOItem('${it.id}','shiji_code',this.value)" class="po-in" placeholder="${remarkPh}"></td>
        <td><input type="number" value="${it.quantity||''}" onchange="updPOItem('${it.id}','quantity',this.value)" class="po-in po-num" placeholder="0"></td>
        <td><input type="date" value="${it.desired_delivery||''}" onchange="updPOItem('${it.id}','desired_delivery',this.value)" class="po-in"></td>
        <td><span class="po-prefix">${u}</span><input type="number" step="0.01" value="${it.wholesale_price||autoPrice||''}" onchange="updPOItem('${it.id}','wholesale_price',this.value)" class="po-in po-num po-money" placeholder="${autoPrice||0}"></td>
        <td style="white-space:nowrap;"><button class="btn btn-o btn-sm" onclick="addPOItemBefore('${po.id}','${it.id}')" title="この行の上に追加">＋↑</button> <button class="btn btn-d btn-sm" onclick="delPOItem('${it.id}')">×</button></td>
      </tr>`;
    });
    h+=`</tbody></table></div>
      <div style="padding:8px;background:#f9fafb;"><button class="btn btn-o btn-sm" onclick="addPOItem('${po.id}')">＋ 行追加</button></div>
    </div>`;
  });
  return h;
}

async function addBulkPO(){
  const coName=CUSTOMERS.find(c=>c.id===curCust)?.name||'';
  if(!coName)return;
  if(!PRODUCTS.length){toast('品番が登録されていません');return;}
  if(!confirm(`${coName}の${CUR_YEAR}年度の全品番（${PRODUCTS.length}件）を発注書として作成しますか？`))return;
  const today=new Date().toISOString().split('T')[0];
  const poId='po_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4);
  await sb.from('purchase_orders').insert({
    id:poId,company:coName,year:CUR_YEAR,receive_date:today,send_date:null,notes:'量産発注',
    created_at:new Date().toISOString()
  });
  // 全品番を明細に追加（副資材込み価格を優先）
  const priceMap={};
  QUOTES.forEach(q=>{
    if(q.quote_type==='sub')return;
    const code=q.product_id?(PRODUCTS.find(p=>p.id===q.product_id)?.code||'').trim():(q.product_code||'');
    if(code){
      const price=q.wholesale_with_sub||q.wholesale_price||0;
      if(price)priceMap[code]=price;
    }
  });
  const items=PRODUCTS.map((p,i)=>({
    id:'poi_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4)+i,
    po_id:poId,product_code:p.code||'',shiji_code:'',quantity:0,
    desired_delivery:null,wholesale_price:priceMap[(p.code||'').trim()]||0,
    currency:CO_SETTINGS.default_currency||'JPY',sort_order:i
  }));
  await sb.from('purchase_order_items').insert(items);
  await loadMeetings();toast('量産発注書を作成しました');
}

async function addEmptyPO(){
  const coName=CUSTOMERS.find(c=>c.id===curCust)?.name||'';
  if(!coName)return;
  const today=new Date().toISOString().split('T')[0];
  const poId='po_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4);
  await sb.from('purchase_orders').insert({id:poId,company:coName,year:CUR_YEAR,receive_date:today,created_at:new Date().toISOString()});

}

async function addPOItem(poId){
  const items=POITEMS.filter(i=>i.po_id===poId);
  const maxSort=items.length?Math.max(...items.map(i=>i.sort_order||0))+1:0;
  await sb.from('purchase_order_items').insert({
    id:'poi_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4),
    po_id:poId,product_code:'',shiji_code:'',quantity:0,
    wholesale_price:0,currency:CO_SETTINGS.default_currency||'JPY',sort_order:maxSort
  });
  await loadMeetings();
}

async function addPOItemBefore(poId,beforeItemId){
  const items=POITEMS.filter(i=>i.po_id===poId).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0));
  const target=items.find(i=>i.id===beforeItemId);
  if(!target)return;
  const targetSort=target.sort_order||0;
  // targetSort以降の全行のsort_orderを+1（後ろにずらす）
  for(const it of items){
    if((it.sort_order||0)>=targetSort){
      await sb.from('purchase_order_items').update({sort_order:(it.sort_order||0)+1}).eq('id',it.id);
    }
  }
  // 新規行を挿入
  await sb.from('purchase_order_items').insert({
    id:'poi_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4),
    po_id:poId,product_code:'',shiji_code:'',quantity:0,
    wholesale_price:0,currency:CO_SETTINGS.default_currency||'JPY',sort_order:targetSort
  });
  await loadMeetings();toast('行を上に追加しました');
}

async function updPO(id,field,val){
  await sb.from('purchase_orders').update({[field]:val,updated_by:currentUser.email,updated_at:new Date().toISOString()}).eq('id',id);
  const po=POS.find(p=>p.id===id);if(po)po[field]=val;
}

async function updPOItem(id,field,val){
  let v=val;
  if(['quantity','wholesale_price'].includes(field))v=parseFloat(val)||0;
  await sb.from('purchase_order_items').update({[field]:v}).eq('id',id);
  const it=POITEMS.find(i=>i.id===id);if(it)it[field]=v;
  if(field==='product_code')render();
}

async function delPO(id){
  if(!confirm('この発注書を削除しますか？明細も全て削除されます'))return;
  await sb.from('purchase_orders').delete().eq('id',id);
  await loadMeetings();toast('削除しました');
}

async function delPOItem(id){
  await sb.from('purchase_order_items').delete().eq('id',id);
  await loadMeetings();
}

function renderQuotes(){
  const coName=CUSTOMERS.find(c=>c.id===curCust)?.name||'';
  const defaultCurrency=CO_SETTINGS.default_currency||'JPY';
  const coSymbol='元';

  const curRate=defaultCurrency==='JPY'?(CO_SETTINGS.default_rate_jpy||20):(CO_SETTINGS.default_rate_usd||0.14);
  let h=`<div style="margin-bottom:10px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:8px 12px;background:#f0f4ff;border-radius:6px;border:1px solid #c7d2fe;">
    <button class="btn btn-p" onclick="addCustomQuote()">＋ 独自品番を追加（加飾違い等）</button>
    <span style="font-size:12px;color:var(--g700);font-weight:600;">通貨:</span>
    <select onchange="updateCompanyCurrency(this.value)" style="padding:4px 8px;font-size:12px;font-weight:700;border:1px solid var(--g300);border-radius:4px;background:#fff;color:var(--pri-d);">
      <option${defaultCurrency==='JPY'?' selected':''}>JPY</option>
      <option${defaultCurrency==='USD'?' selected':''}>USD</option>
    </select>
    <span style="font-size:12px;color:var(--g700);font-weight:600;">レート (元→${defaultCurrency}):</span>
    <input type="number" step="0.0001" value="${curRate}" onchange="updateCompanyRate(this.value)" style="padding:4px 8px;font-size:12px;font-weight:700;border:1px solid var(--g300);border-radius:4px;width:100px;text-align:right;background:#fff;">
    <button class="btn btn-o btn-sm" onclick="applyRateToAll()" title="現在の全見積りにこのレートを適用">全見積りに反映</button>
  </div>`;

  // 品番マスター × 2行（カテゴリ + 副資材）+ 独自品番
  const linkedQuotes=QUOTES.filter(q=>q.product_id);
  const customQuotes=QUOTES.filter(q=>!q.product_id);

  const rows=[];
  PRODUCTS.forEach(p=>{
    // メイン行（カテゴリ）
    const mainQ=linkedQuotes.find(qt=>qt.product_id===p.id&&(qt.quote_type==='main'||!qt.quote_type));
    rows.push({product:p,quote:mainQ||null,isCustom:false,type:'main',category:p.category||''});
    // 副資材行
    const subQ=linkedQuotes.find(qt=>qt.product_id===p.id&&qt.quote_type==='sub');
    rows.push({product:p,quote:subQ||null,isCustom:false,type:'sub',category:'副資材'});
  });
  customQuotes.forEach(q=>{
    rows.push({product:null,quote:q,isCustom:true,type:q.quote_type||'main',category:q.quote_type==='sub'?'副資材':(q.description||'')});
  });

  if(!rows.length)return h+'<div class="empty"><p>この会社の品番がまだ登録されていません<br>開発・生産管理アプリで品番を登録してください</p></div>';

  // 品番ごとにグループ化（品番セルをrowspanで結合）
  const productGroups=[];
  let curGroup=null;
  rows.forEach(r=>{
    const key=r.isCustom?(r.quote?.id||'custom'):(r.product?.id||'');
    if(!curGroup||curGroup.key!==key){
      curGroup={key,rows:[r]};
      productGroups.push(curGroup);
    }else{
      curGroup.rows.push(r);
    }
  });

  h+=`<div class="qt-wrap"><table class="qt">
    <thead><tr>
      <th style="min-width:110px;">品番</th>
      <th style="min-width:100px;">カテゴリ</th>
      <th style="min-width:110px;">工場見積<br><span class="unit">(元)</span></th>
      <th style="min-width:90px;">レート</th>
      <th class="calc-th" style="min-width:100px;">仕入値</th>
      <th style="min-width:80px;">粗利率</th>
      <th class="calc-th" style="min-width:100px;">計算値</th>
      <th style="min-width:110px;">卸値</th>
      <th style="min-width:120px;">副資材込</th>
      <th style="min-width:65px;">通貨</th>
      <th style="min-width:40px;"></th>
    </tr></thead><tbody>`;

  productGroups.forEach((grp,gIdx)=>{
    grp.rows.forEach((r,rIdx)=>{
      const q=r.quote||{};
      const code=r.isCustom?q.product_code:(r.product.code||'').trim();
      const isParent=r.product?r.product.is_parent:false;
      const curr=q.currency||defaultCurrency;
      const u=curr==='JPY'?'¥':'$';
      const purchase=(parseFloat(q.factory_quote_cny)||0)*(parseFloat(q.rate)||0);
      const calc=(parseFloat(q.margin_rate)||0)<100&&(parseFloat(q.margin_rate)||0)>0?purchase/(1-(parseFloat(q.margin_rate)||0)/100):purchase;
      const qid=q.id||(r.product?`new_${r.product.id}_${r.type}`:`new_${Math.random()}`);
      const isSub=r.type==='sub';
      const qtype=r.type;
      const productRef=r.product?`data-pid="${r.product.id}"`:'';

      // ROW色分け
      let rowCls='qt-row';
      if(rIdx===0)rowCls+=' qt-main';
      if(isSub)rowCls+=' qt-sub';
      if(r.isCustom&&!isSub)rowCls+=' qt-custom';
      if(isParent&&!isSub)rowCls+=' qt-parent';

      h+=`<tr class="${rowCls}" ${productRef}>`;

      // 品番セル: グループの先頭行のみ表示（rowspan=行数）
      if(rIdx===0){
        const codeContent=r.isCustom?`<input type="text" value="${esc(code)}" onchange="updQ2('${qid}','${r.product?.id||''}','product_code',this.value,${r.isCustom},'${qtype}')" class="qt-code-in">`:`<span class="qt-code">${esc(code)}</span>`;
        const customBadge=r.isCustom?'<div class="qt-custom-badge">独自追加</div>':'';
        h+=`<td class="qt-code-cell" rowspan="${grp.rows.length}">${codeContent}${customBadge}</td>`;
      }

      // カテゴリ
      h+=`<td class="qt-cat ${isSub?'qt-cat-sub':''}">${esc(r.category)}</td>`;
      // 工場見積
      h+=`<td><input type="number" step="0.01" value="${q.factory_quote_cny||''}" onchange="updQ2('${qid}','${r.product?.id||''}','factory_quote_cny',this.value,${r.isCustom},'${qtype}')" class="qt-in qt-num" placeholder="0"></td>`;
      // レート
      h+=`<td><input type="number" step="0.0001" value="${q.rate||''}" onchange="updQ2('${qid}','${r.product?.id||''}','rate',this.value,${r.isCustom},'${qtype}')" class="qt-in qt-num" placeholder="0"></td>`;
      // 仕入値（自動）
      h+=`<td class="qt-calc">${u}${purchase.toLocaleString(undefined,{maximumFractionDigits:2})}</td>`;
      // 粗利率（% を同じセルに）
      h+=`<td class="qt-pct-cell"><input type="number" step="0.1" value="${q.margin_rate||''}" onchange="updQ2('${qid}','${r.product?.id||''}','margin_rate',this.value,${r.isCustom},'${qtype}')" class="qt-in qt-num" placeholder="0"><span class="qt-suffix">%</span></td>`;
      // 計算値（自動）
      h+=`<td class="qt-calc">${u}${calc.toLocaleString(undefined,{maximumFractionDigits:2})}</td>`;
      // 卸値（通貨記号を同じセルに、強調）
      h+=`<td class="qt-money-cell qt-main-money"><span class="qt-prefix">${u}</span><input type="number" step="0.01" value="${q.wholesale_price||''}" onchange="updQ2('${qid}','${r.product?.id||''}','wholesale_price',this.value,${r.isCustom},'${qtype}')" class="qt-in qt-num" placeholder="0"></td>`;
      // 副資材込
      if(isSub){h+=`<td class="qt-disabled">-</td>`;}
      else{h+=`<td class="qt-money-cell qt-main-money"><span class="qt-prefix">${u}</span><input type="number" step="0.01" value="${q.wholesale_with_sub||''}" onchange="updQ2('${qid}','${r.product?.id||''}','wholesale_with_sub',this.value,${r.isCustom},'${qtype}')" class="qt-in qt-num" placeholder="0"></td>`;}
      // 通貨
      h+=`<td class="qt-fixed">${curr}</td>`;
      // 削除
      h+=`<td>${r.isCustom&&!isSub?`<button class="btn btn-d btn-sm" onclick="delQuote('${q.id}')">×</button>`:''}</td>`;

      h+=`</tr>`;
    });
  });
  h+=`</tbody></table></div>`;

// 見積り更新（品番リンク型）
async function updQ2(qid,productId,field,val,isCustom,qtype){
  const coName=CUSTOMERS.find(c=>c.id===curCust)?.name||'';
  const defaultCurrency=CO_SETTINGS.default_currency||'JPY';
  const defaultRate=defaultCurrency==='JPY'?(CO_SETTINGS.default_rate_jpy||20):(CO_SETTINGS.default_rate_usd||0.14);

  // 既存quoteを探す: idで見つからなければ product_id+quote_type で再検索（重複防止）
  let q=QUOTES.find(x=>x.id===qid);
  if(!q&&productId){
    q=QUOTES.find(x=>x.product_id===productId&&(x.quote_type||'main')===(qtype||'main'));
  }
  const isNew=!q;
  if(isNew){
    q={
      id:'q_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4),
      company:coName,year:CUR_YEAR,
      product_id:isCustom?null:(productId||null),
      product_code:'',description:'',
      quote_type:qtype||'main',
      factory_quote_cny:0,rate:defaultRate,margin_rate:0,
      wholesale_price:0,wholesale_with_sub:0,
      currency:defaultCurrency,sort_order:QUOTES.length,
      created_at:new Date().toISOString()
    };
    QUOTES.push(q);
  }
  q[field]=['product_code','description','currency'].includes(field)?val:(parseFloat(val)||0);
  q.updated_by=currentUser.email;q.updated_at=new Date().toISOString();

  document.getElementById('savingInd')?.classList.add('show');
  const{error}=await sb.from('quotes').upsert(q);
  document.getElementById('savingInd')?.classList.remove('show');
  if(error){
    console.error('===見積り保存エラー===');
    console.error('error.message:',error.message);
    console.error('error.details:',error.details);
    console.error('error.hint:',error.hint);
    console.error('error.code:',error.code);
    console.error('送信データ:',JSON.stringify(q,null,2));
    toast('保存失敗: '+(error.message||'詳細はF12のConsoleで確認'));
    return;
  }
  render();
}

async function switchYear(y){CUR_YEAR=y;await loadMeetings();}

async function addYear(){
  const next=YEARS.length?YEARS[YEARS.length-1]+1:new Date().getFullYear();
  const input=prompt('追加する年度を入力（西暦4桁）:',next);
  if(!input)return;
  const yr=parseInt(input);
  if(isNaN(yr)||yr<2000||yr>2100){toast('正しい年度を入力してください');return;}
  if(YEARS.includes(yr)){toast(`${yr}年度は既に存在します`);return;}
  await sb.from('years').insert({year:yr});

  // 前年度の見積りを引き継ぐ（議事録・発注書は引き継がない）
  const prevYr=YEARS.length?YEARS[YEARS.length-1]:null;
  let copiedQuotes=0;
  if(prevYr){
    const{data:prevQuotes}=await sb.from('quotes').select('*').eq('year',prevYr);
    if(prevQuotes&&prevQuotes.length){
      const newQuotes=prevQuotes.map((q,i)=>({
        ...q,
        id:`q_${yr}_${Date.now().toString(36)}${i}`,
        year:yr,
        created_at:new Date().toISOString(),
        updated_at:new Date().toISOString(),
        updated_by:currentUser.email
      }));
      // チャンク単位で投入（一度に多すぎる場合の対策）
      const chunkSize=50;
      for(let j=0;j<newQuotes.length;j+=chunkSize){
        await sb.from('quotes').insert(newQuotes.slice(j,j+chunkSize));
      }
      copiedQuotes=newQuotes.length;
    }
  }

  YEARS.push(yr);YEARS.sort();
  CUR_YEAR=yr;
  await loadMeetings();
  toast(`${yr}年度を追加しました${copiedQuotes?`（見積り${copiedQuotes}件を引き継ぎ）`:''}`);
}

async function deleteYear(yr){
  if(YEARS.length<=1){toast('最後の年度は削除できません');return;}
  if(!confirm(`${yr}年度のデータを完全に削除しますか？\n議事録・決定事項・見積りも全て削除されます。`))return;
  // 関連データを削除
  await sb.from('decisions').delete().eq('year',yr);
  await sb.from('meetings').delete().eq('year',yr);
  await sb.from('quotes').delete().eq('year',yr);
  await sb.from('years').delete().eq('year',yr);
  YEARS=YEARS.filter(y=>y!==yr);
  if(CUR_YEAR===yr)CUR_YEAR=YEARS[YEARS.length-1];
  await loadMeetings();toast(`${yr}年度を削除しました`);
}

async function saveMeeting(){
  const date=document.getElementById('mtDate').value;
  const title=document.getElementById('mtTitleIn').value.trim();
  if(!date||!title){toast('日付とタイトルを入力');return;}
  const editId=document.getElementById('mtId').value;
  const mtData={
    customer_id:curCust,year:CUR_YEAR,meeting_date:date,title,
    attendees:document.getElementById('mtAttendees').value.trim(),
    content:document.getElementById('mtContent').value.trim(),
    our_tasks:document.getElementById('mtOurTasks').value.trim(),
    customer_tasks:document.getElementById('mtCustTasks').value.trim(),
    updated_by:currentUser.email,updated_at:new Date().toISOString()
  };

  document.getElementById('savingInd').classList.add('show');
  let mtId=editId;
  if(editId){
    await sb.from('meetings').update(mtData).eq('id',editId);
    // 既存の決定事項を削除して再挿入
    await sb.from('decisions').delete().eq('meeting_id',editId);
  }else{
    mtId='mt_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4);
    mtData.id=mtId;mtData.created_by=currentUser.email;mtData.created_at=new Date().toISOString();
    await sb.from('meetings').insert(mtData);
  }
  // 決定事項を保存
  if(editDecisions.length){
    const decs=editDecisions.map((d,i)=>({
      id:d.id||('dc_'+Date.now().toString(36)+Math.random().toString(36).substr(2,4)+i),
      meeting_id:mtId,customer_id:curCust,year:CUR_YEAR,
      content:d.content,category:d.category||'',product_code:d.product_code||'',
      decided_at:date
    }));
    await sb.from('decisions').insert(decs);
  }
  document.getElementById('savingInd').classList.remove('show');
  closeMo('mtMo');await loadMeetings();toast(editId?'更新しました':'保存しました');
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function openMo(id){document.getElementById(id).classList.add('active');}
function closeMo(id){document.getElementById(id).classList.remove('active');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// 数値入力で矢印キー＆スクロールホイールを無効化（誤操作防止）
// 見積り管理（.qt-in）では矢印キーでセル移動
document.addEventListener('keydown',e=>{
  const t=e.target;
  if(t.type!=='number'&&!t.classList?.contains('qt-in'))return;
  // 上下矢印で値変更を防ぐ
  if(e.key==='ArrowUp'||e.key==='ArrowDown'||e.key==='ArrowLeft'||e.key==='ArrowRight'){
    // 見積り入力欄ならセル移動
    if(t.classList.contains('qt-in')){
      e.preventDefault();
      moveQtCell(t,e.key);
      return;
    }
    // それ以外の数値入力では値変更を防ぐ
    if(e.key==='ArrowUp'||e.key==='ArrowDown')e.preventDefault();
  }
  // Enterで下のセルに移動
  if(e.key==='Enter'&&t.classList?.contains('qt-in')){
    e.preventDefault();t.blur();
    setTimeout(()=>moveQtCell(t,'ArrowDown'),50);
  }
},true);
document.addEventListener('wheel',e=>{
  if(e.target.type==='number'&&document.activeElement===e.target){e.preventDefault();}
},{passive:false});

// 見積り管理のセル移動
function moveQtCell(input,direction){
  const td=input.closest('td');if(!td)return;
  const tr=td.closest('tr');if(!tr)return;
  const tbody=tr.parentElement;
  const tdIdx=Array.from(tr.children).indexOf(td);
  let targetTd=null;
  if(direction==='ArrowLeft'){
    // 同じ行の前のセル
    let prev=td.previousElementSibling;
    while(prev&&!prev.querySelector('input,select')){prev=prev.previousElementSibling;}
    targetTd=prev;
  }else if(direction==='ArrowRight'){
    let next=td.nextElementSibling;
    while(next&&!next.querySelector('input,select')){next=next.nextElementSibling;}
    targetTd=next;
  }else if(direction==='ArrowUp'){
    let prevRow=tr.previousElementSibling;
    while(prevRow){
      const cell=prevRow.children[tdIdx];
      if(cell&&cell.querySelector('input,select')){targetTd=cell;break;}
      prevRow=prevRow.previousElementSibling;
    }
  }else if(direction==='ArrowDown'){
    let nextRow=tr.nextElementSibling;
    while(nextRow){
      const cell=nextRow.children[tdIdx];
      if(cell&&cell.querySelector('input,select')){targetTd=cell;break;}
      nextRow=nextRow.nextElementSibling;
    }
  }
  if(targetTd){
    const targetInput=targetTd.querySelector('input,select');
    if(targetInput){
      targetInput.focus();
      if(targetInput.select)targetInput.select();
    }
  }
}
